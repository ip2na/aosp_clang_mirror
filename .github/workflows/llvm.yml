name: Check LLVM Update

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      LLVM_API: "https://api.github.com/repos/llvm/llvm-project/releases/latest"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch latest LLVM release
        id: fetch
        run: |
          RESPONSE=$(curl -fsSL "$LLVM_API")
          TAG=$(echo "$RESPONSE" | jq -r .tag_name)
          VERSION=$(echo "$TAG" | sed 's/llvmorg-//')
          URL=$(echo "$RESPONSE" | jq -r .html_url)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Check if already notified
        id: exists
        run: |
          TAG="${{ steps.fetch.outputs.tag }}"
          if git tag --list "$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Already up to date
        if: steps.exists.outputs.exists == 'true'
        run: echo "LLVM ${{ steps.fetch.outputs.tag }} already notified, skipping."

      - name: Create tag
        if: steps.exists.outputs.exists == 'false'
        run: |
          git config user.name "anyaanasera"
          git config user.email "anyaprjkt.my.id"
          git tag "${{ steps.fetch.outputs.tag }}"
          git push origin "${{ steps.fetch.outputs.tag }}"

      - name: Telegram Notify
        if: steps.exists.outputs.exists == 'false'
        env:
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: |
          TAG="${{ steps.fetch.outputs.tag }}"
          VERSION="${{ steps.fetch.outputs.version }}"
          URL="${{ steps.fetch.outputs.url }}"
          SLIM_URL="https://mirrors.edge.kernel.org/pub/tools/llvm/files/"

          cat > caption.txt <<EOF
          *LLVM Update*
          $(date +'%Y-%m-%d')
          #LLVM

          *Release tag*: \`${TAG}\`
          *Version*: LLVM ${VERSION}

          [ Release Page](${URL})
          [ Slim LLVM Toolchains](${SLIM_URL})
          EOF

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d disable_web_page_preview=true \
            -d parse_mode=Markdown \
            --data-urlencode text@caption.txt
